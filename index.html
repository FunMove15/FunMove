<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FunMove — Manutenção</title>

  <!-- Estilo simples e centrado -->
  <style>
    :root{
      --bg:#0f1720;
      --card:#0b1220;
      --accent:#ff4d4d;
      --muted:#9aa3ad;
      --glass: rgba(255,255,255,0.03);
    }
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(180deg,var(--bg),#07101a);
      color:#e6eef3;
      display:flex;
      align-items:center;
      justify-content:center;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }
    .wrap{
      width:min(920px,94%);
      background:linear-gradient(180deg,var(--card),rgba(11,18,32,0.9));
      border-radius:14px;
      padding:36px;
      box-shadow:0 10px 40px rgba(2,6,23,0.6);
      text-align:center;
      border:1px solid rgba(255,255,255,0.03);
    }
    .logo{
      font-weight:800;
      color:var(--accent);
      font-size:28px;
      letter-spacing:0.6px;
      margin-bottom:8px;
    }
    h1{
      margin:6px 0 12px;
      font-size:28px;
      color:#fff;
    }
    p.lead{
      color:var(--muted);
      margin:0 0 22px;
      font-size:16px;
    }
    .btn{
      display:inline-block;
      background:var(--accent);
      color:#fff;
      padding:12px 20px;
      border-radius:10px;
      text-decoration:none;
      font-weight:600;
      box-shadow:0 8px 20px rgba(255,77,77,0.12);
      transition:transform .15s ease, box-shadow .15s ease;
    }
    .btn:hover{transform:translateY(-3px)}
    .small{
      margin-top:18px;
      color:var(--muted);
      font-size:13px;
    }
    .meta{
      margin-top:14px;
      color:rgba(255,255,255,0.06);
      font-size:12px;
      padding-top:14px;
      border-top:1px solid rgba(255,255,255,0.02);
    }

    /* contador opcional */
    .countdown{display:inline-block;margin-top:12px;color:#fff;font-weight:700;padding:6px 10px;border-radius:8px;background:var(--glass)}
    @media (max-width:520px){
      .wrap{padding:22px}
      h1{font-size:22px}
    }
  </style>

  <!-- Redirecionamento automático: substitui o URL abaixo -->
  <meta http-equiv="refresh" content="8;url=YOUR_REDIRECT_URL_HERE">
</head>
<body>
  <div class="wrap" role="main" aria-live="polite">
    <div class="logo">FunMove</div>
    <h1>Site em manutenção</h1>
    <p class="lead">Estamos a fazer melhorias rápidas para te oferecer uma experiência melhor. Seremos breves.</p>

    <a id="redirectBtn" class="btn" href="YOUR_REDIRECT_URL_HERE">Ir para o link temporário</a>

    <div class="small">
      Serás redirecionado automaticamente em <span id="secs" class="countdown">8</span> segundos.
    </div>

    <div class="meta">Se não fores redirecionado, clica no botão acima.</div>
  </div>

  <script>
    // Contador regressivo visível
    (function(){
      var seconds = 8;
      var el = document.getElementById('secs');
      var btn = document.getElementById('redirectBtn');
      function tick(){
        seconds--;
        if(seconds <= 0){
          el.textContent = 0;
          // fallback: garante redirecionamento por JS se meta refresh falhar
          var url = btn.getAttribute('href');
          if(url && url !== 'https://linktr.ee/funmove') location.href = url;
          return;
        }
        el.textContent = seconds;
        setTimeout(tick, 1000);
      }
      setTimeout(tick, 1000);
    })();
  </script>
</body>
</html>
